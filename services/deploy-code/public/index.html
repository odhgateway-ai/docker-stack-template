<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deploy Code</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Docker Stack</p>
          <h1>Deploy Code</h1>
        </div>
        <div class="topbar-actions">
          <label class="token-field">
            <span>API token</span>
            <input id="tokenInput" type="password" autocomplete="off" spellcheck="false">
          </label>
          <button id="saveTokenBtn" class="secondary" type="button" title="Save token in this browser">Save</button>
          <button id="refreshBtn" type="button" title="Refresh status">Refresh</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel status-panel">
          <div class="panel-heading">
            <h2>Status</h2>
            <span id="statusBadge" class="badge neutral">Unknown</span>
          </div>
          <div id="statusGrid" class="status-grid"></div>
        </section>

        <section class="panel actions-panel">
          <div class="panel-heading">
            <h2>Deploy</h2>
            <span id="runningBadge" class="badge neutral">Idle</span>
          </div>
          <div class="button-row">
            <button id="checkBtn" type="button" title="Fetch remote and compare commits">Check</button>
            <button id="deployBtn" type="button" title="Deploy only when remote has changed">Deploy</button>
            <button id="forceDeployBtn" class="danger" type="button" title="Run deploy even when commit is unchanged">Force</button>
          </div>
          <div class="upload-row">
            <input id="zipInput" type="file" accept=".zip,application/zip">
            <button id="uploadBtn" class="secondary" type="button" title="Apply uploaded zip to workspace">Upload ZIP</button>
          </div>
          <pre id="lastRunBox" class="result-box"></pre>
        </section>

        <section class="panel wide">
          <div class="panel-heading">
            <h2>Services</h2>
            <button id="servicesBtn" class="secondary compact" type="button" title="Reload compose services">Reload</button>
          </div>
          <div id="servicesList" class="list"></div>
        </section>

        <section class="panel wide">
          <div class="panel-heading">
            <h2>Containers</h2>
            <button id="containersBtn" class="secondary compact" type="button" title="Reload containers">Reload</button>
          </div>
          <div id="containersList" class="list"></div>
        </section>

        <section class="panel logs-panel">
          <div class="panel-heading">
            <h2>Logs</h2>
            <div class="inline-controls">
              <input id="logLinesInput" type="number" min="20" max="2000" step="20" value="200">
              <button id="logsBtn" class="secondary compact" type="button" title="Reload deploy-code logs">Reload</button>
            </div>
          </div>
          <pre id="logsBox" class="logs-box"></pre>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
